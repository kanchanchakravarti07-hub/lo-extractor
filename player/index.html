<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stream Master | KANCHAN</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .video-container { width: 100%; max-width: 900px; }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="my-video" class="video-js vjs-big-play-centered" controls autoplay playsinline muted></video>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    
    <script>
        var player = videojs('my-video', {
            html5: {
                hls: {
                    overrideNative: true
                }
            }
        });

        let currentSrc = "";

        async function fetchAndPlay() {
            try {
                const res = await fetch('/get-live-link');
                const data = await res.json();
                
                // Agar link mil gaya aur naya hai, toh hi update karo
                if (data.url && currentSrc !== data.url) {
                    console.log("🔥 Setting stream to proxy:", data.url);
                    currentSrc = data.url;
                    
                    // Proxy route use karo
                    player.src({ 
                        src: '/proxy-stream', 
                        type: 'application/x-mpegURL' 
                    });
                    
                    player.load();
                    player.play().catch(e => console.log("Autoplay blocked."));
                }
            } catch (e) { 
                console.warn("Waiting for link..."); 
            }
        }

        setInterval(fetchAndPlay, 5000);
        fetchAndPlay();
    </script>
</body>
</html>
