<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stream Master | KANCHAN</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="video-container">
        <video id="my-video" class="video-js vjs-big-play-centered" controls autoplay playsinline muted></video>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    
    <script>
        // Initialize Video.js with robust HLS options
        var player = videojs('my-video', {
            html5: {
                hls: {
                    overrideNative: true, // Forces Video.js to use its own HLS engine
                    preloadMetadata: true,
                    allowNudgeGaps: true // Helps keep the stream alive
                }
            }
        });

        async function fetchAndPlay() {
            try {
                const res = await fetch('/get-live-link');
                const data = await res.json();
                
                if (data.url && player.src() !== data.url) {
                    console.log("🔥 Switching to stream:", data.url);
                    
                    // Update the source with proper type
                    player.src({ 
                        src: data.url, 
                        type: 'application/x-mpegURL' 
                    });
                    
                    // Force the player to load and play
                    player.load();
                    player.play().catch(e => console.log("Autoplay blocked, user interaction needed."));
                }
            } catch (e) { 
                console.warn("Waiting for stream..."); 
            }
        }

        // Check for new link every 5 seconds
        setInterval(fetchAndPlay, 5000);
        fetchAndPlay();
    </script>
</body>
</html>
